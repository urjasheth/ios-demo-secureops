name: "🛡️ SecurOps Hybrid — Complete Security Pipeline"
# ✅ Gitleaks + TruffleHog (Secrets) + Semgrep (SAST) + CodeQL (Deep SAST) + Trivy (SCA)
# ✅ Nuclei (Fast DAST) + OWASP ZAP (Deep DAST) + Checkov (IaC)
# ✅ AI Code Review + AI Auto-Fix (Gemini/Groq) + Dashboard
# 🔀 Hybrid: Best of Approach A + Approach B

on:
  pull_request:
    branches: [main, master, develop, "release/**"]
  push:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * MON"

permissions:
  contents: write
  security-events: write
  pull-requests: write
  issues: write

jobs:

  # ══════════════════════════════════════════════════════════
  # JOB 1: SECRETS — Gitleaks (Fast Regex-Based)
  # From: Approach B
  # ══════════════════════════════════════════════════════════
  secret-scan:
    name: "🔐 Secrets (Gitleaks)"
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: count
        if: always()
        run: |
          C=$(jq '.runs[0].results|length' results/gitleaks.sarif 2>/dev/null || echo 0)
          echo "count=$C" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-secrets
          path: results/
          if-no-files-found: ignore
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # JOB 2: SECRETS — TruffleHog (Verified Keys)
  # From: Approach A — pings providers to confirm real keys
  # ══════════════════════════════════════════════════════════
  secret-scan-verified:
    name: "🔑 Secrets Verified (TruffleHog)"
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Verified Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --json
        continue-on-error: true
      - id: count
        if: always()
        run: |
          if [ -f trufflehog-results.json ]; then
            C=$(jq -s 'length' trufflehog-results.json 2>/dev/null || echo 0)
          else
            C=0
          fi
          echo "count=$C" >> $GITHUB_OUTPUT
      - name: Gate on Verified Secrets
        run: |
          C=${{ steps.count.outputs.count }}
          if [ "$C" -gt 0 ]; then
            echo "❌ BLOCK: $C verified (REAL) secrets detected!"
            echo "   These are confirmed active credentials that MUST be rotated."
            exit 1
          fi
          echo "✅ No verified secrets found"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-secrets-verified
          path: trufflehog-results.json
          if-no-files-found: ignore
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # JOB 3: SAST — Semgrep (Generic + Mobile Rules)
  # From: Approach B (generic) + Approach A (mobile rules)
  # ══════════════════════════════════════════════════════════
  sast-scan:
    name: "🔍 SAST (Semgrep)"
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    outputs:
      count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SARIF
        run: |
          semgrep scan --config=auto --config=p/owasp-top-ten \
            --config=p/security-audit --config=p/cwe-top-25 \
            --config=semgrep-mobile.yml \
            --exclude=.gitleaks.toml \
            --sarif --output=semgrep.sarif \
            --severity=ERROR --severity=WARNING --quiet || true
      - name: Semgrep JSON
        run: |
          semgrep scan --config=auto --config=p/owasp-top-ten \
            --config=p/security-audit --config=p/cwe-top-25 \
            --config=semgrep-mobile.yml \
            --exclude=.gitleaks.toml \
            --json --output=semgrep.json \
            --severity=ERROR --severity=WARNING --quiet || true
      - id: count
        if: always()
        run: echo "count=$(jq '[.results[]?]|length' semgrep.json 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-sast
          path: semgrep.*
          if-no-files-found: ignore
          retention-days: 30
      - name: Gate on HIGH
        run: |
          C=$(jq '[.results[]?|select(.extra.severity=="ERROR")]|length' semgrep.json 2>/dev/null || echo 0)
          [ "$C" -gt 0 ] && jq -r '.results[]|select(.extra.severity=="ERROR")|"  ❌ [\(.path):\(.start.line)] \(.extra.message)"' semgrep.json && exit 1
          echo "✅ No HIGH SAST issues"

  # ══════════════════════════════════════════════════════════
  # JOB 4: SCA — Trivy
  # From: Approach B
  # ══════════════════════════════════════════════════════════
  sca-scan:
    name: "🛡️ SCA (Trivy)"
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: "."
          format: json
          output: trivy.json
          severity: "CRITICAL,HIGH"
          exit-code: "1"
      - id: count
        if: always()
        run: echo "count=$(jq '[.Results[]?.Vulnerabilities[]?]|length' trivy.json 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-sca
          path: trivy.*
          if-no-files-found: ignore
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # JOB 5: DAST — Nuclei (Fast File/Config Scan)
  # From: Approach B
  # ══════════════════════════════════════════════════════════
  dast-scan:
    name: "🌐 DAST Fast (Nuclei)"
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Nuclei
        run: |
          wget -qO /tmp/n.zip \
            https://github.com/projectdiscovery/nuclei/releases/download/v3.2.0/nuclei_3.2.0_linux_amd64.zip
          unzip -q /tmp/n.zip -d /tmp
          sudo mv /tmp/nuclei /usr/local/bin/
          nuclei -update-templates -silent 2>/dev/null || true
      - name: Nuclei file scan (configs + exposed secrets)
        run: |
          nuclei -target . \
            -tags exposure,config,file,token \
            -severity medium,high,critical \
            -json-export nuclei.json \
            -no-interactsh -silent || true
      - name: Nuclei URL scan (if TARGET_URL secret is set)
        if: ${{ env.TARGET_URL != '' }}
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
        run: |
          nuclei -target "$TARGET_URL" \
            -tags oast,xss,sqli,ssrf,rce,lfi \
            -severity high,critical \
            -json-export nuclei-web.json \
            -no-interactsh -silent || true
          cat nuclei-web.json >> nuclei.json 2>/dev/null || true
      - id: count
        if: always()
        run: |
          if [ -f nuclei.json ] && [ -s nuclei.json ]; then
            C=$(jq -s 'length' nuclei.json 2>/dev/null)
            [ -z "$C" ] && C=0
          else
            C=0
          fi
          echo "count=$C" >> $GITHUB_OUTPUT
      - name: Gate on CRITICAL/HIGH
        run: |
          CRIT=$(jq -s '[.[]|select(.info.severity=="critical")]|length' nuclei.json 2>/dev/null || echo 0)
          HIGH=$(jq -s '[.[]|select(.info.severity=="high")]|length' nuclei.json 2>/dev/null || echo 0)
          if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            jq -rs '.[]|select(.info.severity=="critical" or .info.severity=="high")|"  ❌ [\(.info.severity|ascii_upcase)] \(.info.name)"' nuclei.json || true
            exit 1
          fi
          echo "✅ No CRITICAL/HIGH Nuclei findings"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-dast
          path: nuclei.json
          if-no-files-found: ignore
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # JOB 6: DAST — OWASP ZAP (Deep API Scan)
  # From: Approach A — real HTTP attacks against live endpoints
  # Requires: TARGET_URL secret OR swagger spec in repo
  # ══════════════════════════════════════════════════════════
  dast-zap:
    name: "🕷️ DAST Deep (OWASP ZAP)"
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_ZAP == 'true' || github.event_name == 'schedule' }}
    outputs:
      count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - name: Find API spec
        id: spec
        run: |
          SPEC=""
          for f in swagger.json swagger.yaml openapi.json openapi.yaml api-spec.json api-spec.yaml; do
            if [ -f "$f" ]; then SPEC="$f"; break; fi
            if [ -f "docs/$f" ]; then SPEC="docs/$f"; break; fi
            if [ -f "assets/$f" ]; then SPEC="assets/$f"; break; fi
          done
          if [ -n "$SPEC" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=$SPEC" >> $GITHUB_OUTPUT
            echo "✅ Found API spec: $SPEC"
          elif [ -n "${{ secrets.TARGET_URL }}" ]; then
            echo "found=url" >> $GITHUB_OUTPUT
            echo "✅ Will use TARGET_URL for baseline scan"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "⚠️ No API spec or TARGET_URL — ZAP will run baseline scan"
          fi
      - name: ZAP API Scan (with spec)
        if: steps.spec.outputs.found == 'true'
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: ${{ steps.spec.outputs.path }}
          format: openapi
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          cmd_options: '-c zap.conf -J zap_report.json -r zap_report.html -w zap_report.md -I'
          fail_action: false
          allow_issue_writing: false
          artifact_name: ''
      - name: ZAP Baseline Scan (URL only)
        if: steps.spec.outputs.found == 'url'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.TARGET_URL }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          cmd_options: '-J zap_report.json -r zap_report.html -I'
          fail_action: false
          allow_issue_writing: false
          artifact_name: ''
      - name: Locate ZAP Reports
        if: always()
        run: |
          find . -name "zap_out.json" -exec cp {} zap_report.json \; 2>/dev/null || true
          find . -name "report_json.json" -exec cp {} zap_report.json \; 2>/dev/null || true
          if [ ! -f zap_report.json ]; then echo '{"site":[]}' > zap_report.json; fi
          echo "✅ ZAP report ready"
      - name: Enforce ZAP Thresholds (Block HIGH, Warn MEDIUM)
        if: always()
        run: python3 scripts/zap_report_check.py zap_report.json
      - id: count
        if: always()
        run: |
          HIGH=$(python3 -c "
          import json
          try:
            d=json.load(open('zap_report.json'))
            print(sum(1 for s in d.get('site',[]) for a in s.get('alerts',[]) if a.get('riskcode') in ['3','2']))
          except: print(0)" 2>/dev/null || echo 0)
          echo "count=$HIGH" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-dast-zap
          path: |
            zap_report.*
          if-no-files-found: ignore
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # JOB 7: IaC — Checkov
  # From: Approach B
  # ══════════════════════════════════════════════════════════
  iac-scan:
    name: "🏗️ IaC (Checkov)"
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install checkov --quiet
      - name: Checkov JSON
        run: |
          checkov -d . --output json --output-file checkov.json \
            --soft-fail --quiet --skip-check CKV_GIT_1 2>/dev/null || true
      - name: Checkov SARIF
        run: |
          checkov -d . --output sarif --output-file checkov.sarif \
            --soft-fail --quiet --skip-check CKV_GIT_1 2>/dev/null || true
      - id: count
        if: always()
        run: echo "count=$(jq '[.results?.failed_checks[]?]|length' checkov.json 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov
      - name: Gate on CRITICAL IaC
        run: |
          C=$(jq '[.results?.failed_checks[]?|select(.severity=="CRITICAL" and .check_result.result=="FAILED")]|length' checkov.json 2>/dev/null || echo 0)
          if [ "$C" -gt 0 ]; then
            jq -r '.results?.failed_checks[]?|select(.severity=="CRITICAL" and .check_result.result=="FAILED")|"  ❌ \(.check_id) \(.check.name)"' checkov.json || true
            exit 1
          fi
          echo "✅ No CRITICAL IaC issues"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-iac
          path: checkov.*
          if-no-files-found: ignore
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # JOB 8: CODEQL — Deep SAST (GitHub's Free Taint Analysis)
  # Equivalent to Checkmarx/Veracode deep data-flow analysis
  # ══════════════════════════════════════════════════════════
  codeql-analysis:
    name: "🔬 CodeQL Deep SAST"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Only include languages that exist in your repo
        # Add 'javascript-typescript' when you have JS/TS files
        # Add 'java-kotlin' for Java/Kotlin, 'csharp' for C#, 'go' for Go
        language: ['python']
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # security-and-quality = OWASP + CWE + code quality rules
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ══════════════════════════════════════════════════════════
  # JOB 9: AI CODE REVIEW — Gemini/Groq (Phase 2)
  # Runs on PRs only — posts inline comments like CodeRabbit
  # ══════════════════════════════════════════════════════════
  ai-code-review:
    name: "🧠 AI Code Review"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: AI Code Review (Gemini/Groq)
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ai-code-review.py
        continue-on-error: true

  # ══════════════════════════════════════════════════════════
  # JOB 10: AI AUTO-FIX — Gemini/Groq
  # Runs on push to main when scans fail — creates fix Issues
  # ══════════════════════════════════════════════════════════
  ai-auto-fix:
    name: "🤖 AI Auto-Fix (Gemini)"
    runs-on: ubuntu-latest
    needs: [secret-scan, secret-scan-verified, sast-scan, sca-scan, dast-scan, dast-zap, iac-scan]
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.secret-scan.result == 'failure' ||
       needs.secret-scan-verified.result == 'failure' ||
       needs.sast-scan.result   == 'failure' ||
       needs.sca-scan.result    == 'failure' ||
       needs.dast-scan.result   == 'failure' ||
       needs.dast-zap.result    == 'failure' ||
       needs.iac-scan.result    == 'failure')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: reports/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: AI Auto-Fix (Gemini/Groq)
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: python scripts/ai-auto-fix.py

  # ══════════════════════════════════════════════════════════
  # JOB 11: DASHBOARD + ENROLLMENT TRACKING
  # Updated for 8 tools + AI
  # ══════════════════════════════════════════════════════════
  dashboard:
    name: "📊 Dashboard & Enrollment"
    runs-on: ubuntu-latest
    needs: [secret-scan, secret-scan-verified, sast-scan, sca-scan, dast-scan, dast-zap, iac-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jinja2 --quiet
      - name: Generate dashboard + update enrollment
        env:
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECRET_RESULT: ${{ needs.secret-scan.result }}
          SECRET_COUNT: ${{ needs.secret-scan.outputs.count }}
          SECRET_VERIFIED_RESULT: ${{ needs.secret-scan-verified.result }}
          SECRET_VERIFIED_COUNT: ${{ needs.secret-scan-verified.outputs.count }}
          SAST_RESULT: ${{ needs.sast-scan.result }}
          SAST_COUNT: ${{ needs.sast-scan.outputs.count }}
          SCA_RESULT: ${{ needs.sca-scan.result }}
          SCA_COUNT: ${{ needs.sca-scan.outputs.count }}
          DAST_RESULT: ${{ needs.dast-scan.result }}
          DAST_COUNT: ${{ needs.dast-scan.outputs.count }}
          ZAP_RESULT: ${{ needs.dast-zap.result }}
          ZAP_COUNT: ${{ needs.dast-zap.outputs.count }}
          IAC_RESULT: ${{ needs.iac-scan.result }}
          IAC_COUNT: ${{ needs.iac-scan.outputs.count }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref_name }}
        run: python scripts/generate-report.py
      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: |
            security-dashboard.html
            security-summary.md
            enrollment-tracking.json
          if-no-files-found: ignore
          retention-days: 90
      - name: PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('security-summary.md', 'utf8'); }
            catch(e) { body = '## 🛡️ SecurOps Scan Complete\nSee artifacts for full report.'; }
            const {data:comments} = await github.rest.issues.listComments({
              owner:context.repo.owner, repo:context.repo.repo, issue_number:context.issue.number
            });
            const ex = comments.find(c => c.body.includes('🛡️ SecurOps'));
            if (ex) {
              await github.rest.issues.updateComment({owner:context.repo.owner,repo:context.repo.repo,comment_id:ex.id,body});
            } else {
              await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,body});
            }

  # ══════════════════════════════════════════════════════════
  # JOB 12: SECURITY GATE — final decision, blocks merge
  # Checks ALL scan tools
  # ══════════════════════════════════════════════════════════
  security-gate:
    name: "🚦 Security Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan, secret-scan-verified, sast-scan, sca-scan, dast-scan, dast-zap, iac-scan]
    if: always()
    steps:
      - name: Evaluate all 7 scan results
        run: |
          echo "════════════════════════════════════════════════"
          echo "  SecurOps Hybrid Security Gate — All 7 Tools"
          echo "════════════════════════════════════════════════"
          echo "  🔐 Secrets  (Gitleaks):     ${{ needs.secret-scan.result }}"
          echo "  🔑 Verified (TruffleHog):   ${{ needs.secret-scan-verified.result }}"
          echo "  🔍 SAST     (Semgrep):      ${{ needs.sast-scan.result }}"
          echo "  🛡️  SCA      (Trivy):        ${{ needs.sca-scan.result }}"
          echo "  🌐 DAST     (Nuclei):       ${{ needs.dast-scan.result }}"
          echo "  🕷️  DAST     (OWASP ZAP):    ${{ needs.dast-zap.result }}"
          echo "  🏗️  IaC      (Checkov):      ${{ needs.iac-scan.result }}"
          echo "════════════════════════════════════════════════"
          FAILED=false
          [ "${{ needs.secret-scan.result }}" == "failure" ]          && FAILED=true && echo "  ❌ Gitleaks failed"
          [ "${{ needs.secret-scan-verified.result }}" == "failure" ] && FAILED=true && echo "  ❌ TruffleHog failed (VERIFIED secrets!)"
          [ "${{ needs.sast-scan.result }}"   == "failure" ]          && FAILED=true && echo "  ❌ SAST scan failed"
          [ "${{ needs.sca-scan.result }}"    == "failure" ]          && FAILED=true && echo "  ❌ SCA scan failed"
          [ "${{ needs.dast-scan.result }}"   == "failure" ]          && FAILED=true && echo "  ❌ Nuclei DAST failed"
          [ "${{ needs.dast-zap.result }}"    == "failure" ]          && FAILED=true && echo "  ❌ OWASP ZAP DAST failed"
          [ "${{ needs.iac-scan.result }}"    == "failure" ]          && FAILED=true && echo "  ❌ IaC scan failed"
          echo ""
          if [ "$FAILED" = "true" ]; then
            echo "  ❌ GATE FAILED — merge BLOCKED"
            echo "  Fix all issues or contact: hardikdoshi@devrepublic.nl"
            exit 1
          fi
          echo "  ✅ GATE PASSED — safe to merge"
