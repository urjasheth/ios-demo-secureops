# ZAP Alert Threshold Configuration
# From: Approach A — tuned for mobile API backends
# IGNORE = suppress (false positive), WARN = log only, FAIL = block pipeline

# Informational: Suppress low-value noise
10003	IGNORE	(Vulnerable JS Library - usually false positive for APIs)
10010	IGNORE	(Cookie No HttpOnly Flag - API-only, not applicable)
10011	IGNORE	(Cookie Without Secure Flag - handled at infra level)
10015	IGNORE	(Incomplete or No Cache-control - cosmetic for APIs)
10017	IGNORE	(Cross-Domain JavaScript Source - expected for CDN usage)
10020	IGNORE	(X-Frame-Options Header - not applicable for APIs)
10021	IGNORE	(X-Content-Type-Options Missing - harmless for JSON APIs)

# Medium: Warn but don't block
10036	WARN	(Server Leaks Version Info - useful to know, not critical)
10038	WARN	(Content Security Policy not set - API-only, not critical)
40025	WARN	(Proxy Disclosure - infrastructure concern)

# High/Critical: BLOCK the pipeline
40012	FAIL	(Cross Site Scripting - Reflected)
40014	FAIL	(Cross Site Scripting - Persistent)
40018	FAIL	(SQL Injection)
40019	FAIL	(SQL Injection - MySQL)
40024	FAIL	(SQL Injection - SQLite)
90021	FAIL	(XPath Injection)
90023	FAIL	(XML External Entity Attack)
40003	FAIL	(CRLF Injection)
30001	FAIL	(Buffer Overflow)
30002	FAIL	(Format String Error)
